<!doctype html>
<html lang="id">
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>CryptoGames</title>
<style>
:root{
  --bg:#0b0d12; --bg2:#11151d; --panel:#161b25; --panel2:#1d2330;
  --txt:#e8ecf3; --muted:#8a93a6; --border:#252c3a;
  --green:#22c55e; --red:#ef4444; --blue:#3b82f6; --orange:#f59e0b;
  --gold:#f7931a;
  --male:#3b82f6; --female:#ec4899;
}
.light{
  --bg:#f3f5fa; --bg2:#e9edf5; --panel:#ffffff; --panel2:#f7f9fc;
  --txt:#0f172a; --muted:#5b6478; --border:#dde3ee;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;user-select:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}

/* ========== INTRO ========== */
#intro{position:fixed;inset:0;z-index:100;background:#000;overflow:hidden;transition:opacity 1.2s}
#intro.gone{opacity:0;pointer-events:none}
.floor{position:absolute;inset:50% 0 0 0;perspective:600px;overflow:hidden}
.tiles{position:absolute;inset:0;transform-origin:top center;transform:rotateX(70deg) scale(2.2);
  background:
    linear-gradient(#222 1px,transparent 1px) 0 0/80px 80px,
    linear-gradient(90deg,#222 1px,transparent 1px) 0 0/80px 80px,
    radial-gradient(ellipse at center top,#2a2a2a,#0a0a0a 70%);
  animation:tileScroll 4s linear infinite}
@keyframes tileScroll{from{background-position:0 0,0 0,0 0}to{background-position:0 80px,0 0,0 0}}
.spotlight{position:absolute;left:50%;top:-10%;width:60vmin;height:120vmin;transform:translateX(-50%);
  background:radial-gradient(ellipse at top,rgba(247,147,26,.35),transparent 60%);opacity:0;
  animation:spotOn .8s ease 2.3s forwards}
@keyframes spotOn{to{opacity:1}}
.coin{position:absolute;top:50%;left:-15vmin;width:16vmin;height:16vmin;transform:translateY(-50%);
  animation:rollIn 2.4s cubic-bezier(.25,.46,.45,.94) forwards, dropDown 1s cubic-bezier(.5,0,.5,1) 2.4s forwards;
  filter:drop-shadow(0 8px 24px rgba(247,147,26,.4))}
.coin svg{width:100%;height:100%;animation:spin .35s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes rollIn{from{left:-20vmin;transform:translateY(-50%) rotate(0)}
  to{left:calc(50% - 8vmin);transform:translateY(-50%) rotate(0)}}
@keyframes dropDown{0%{top:50%;transform:translateY(-50%) scale(1)}
  35%{top:38%;transform:translateY(-50%) scale(1.05)}
  55%{top:52%;transform:translateY(-50%) scale(.95)}
  100%{top:50%;transform:translateY(-50%) scale(1)}}
.coin.faceup svg{animation:none}
.introTitle{position:absolute;left:50%;top:72%;transform:translateX(-50%);
  color:#f7931a;font-size:6vmin;font-weight:900;letter-spacing:.3em;opacity:0;
  text-shadow:0 0 20px rgba(247,147,26,.6);animation:titleIn .8s ease 3s forwards}
@keyframes titleIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}
  to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ========== APP ========== */
#app{position:fixed;inset:0;display:flex;flex-direction:column;
  background:
    radial-gradient(ellipse 80% 60% at 20% 0%, rgba(247,147,26,.08), transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 100%, rgba(59,130,246,.06), transparent 60%),
    var(--bg)}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
  background:linear-gradient(180deg, rgba(22,27,37,.92), rgba(22,27,37,.78));
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);gap:8px;z-index:5;
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset, 0 8px 24px -16px #000}
.light header{background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,.8))}
header .logo{width:34px;height:34px;border-radius:10px;object-fit:cover;background:#000;
  box-shadow:0 0 0 1px var(--border), 0 0 18px rgba(247,147,26,.25)}
header .title{font-weight:800;font-size:18px;letter-spacing:.08em;
  background:linear-gradient(180deg,#ffd27a,#f7931a);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
header .gear{padding:6px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;color:var(--muted)}
header .gear:hover{background:var(--panel2);color:var(--gold);transform:rotate(45deg)}
header .stats{display:flex;gap:10px;font-size:11px;color:var(--muted);flex-wrap:wrap}
header .stats .stat{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:8px;
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
  border:1px solid var(--border)}
header .stats b{color:var(--txt);font-size:12px;font-variant-numeric:tabular-nums}
header .stats svg{width:13px;height:13px;opacity:.8}

main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.screen{display:none;padding:16px;max-width:900px;margin:0 auto}
.screen.active{display:block;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ========== HOME (form) ========== */
#home.active{display:flex;flex-direction:column;align-items:center;gap:22px;padding:36px 16px 60px}
#home h2{margin:0;font-size:24px;font-weight:800;letter-spacing:.04em;
  background:linear-gradient(90deg,#f7931a,#ffd27a,#fff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
#home .sub{color:var(--muted);font-size:11px;margin-top:-14px;letter-spacing:.3em;text-transform:uppercase}

.genderRow{display:flex;gap:18px}
.genderBtn{width:104px;height:134px;border-radius:18px;
  background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;transition:all .3s cubic-bezier(.4,0,.2,1);padding:10px;position:relative;overflow:hidden}
.genderBtn::before{content:"";position:absolute;inset:0;border-radius:18px;padding:1px;
  background:linear-gradient(135deg,transparent,transparent);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;transition:background .3s}
.genderBtn:hover{transform:translateY(-4px)}
.genderBtn.active.male{box-shadow:0 12px 32px -10px rgba(59,130,246,.6), inset 0 0 30px rgba(59,130,246,.12)}
.genderBtn.active.male::before{background:linear-gradient(135deg,#60a5fa,#1e40af)}
.genderBtn.active.female{box-shadow:0 12px 32px -10px rgba(236,72,153,.6), inset 0 0 30px rgba(236,72,153,.12)}
.genderBtn.active.female::before{background:linear-gradient(135deg,#f9a8d4,#9d174d)}
.genderBtn svg{width:54px;height:74px;transition:transform .3s}
.genderBtn.active svg{transform:scale(1.05)}
.genderBtn span{font-size:12px;font-weight:700;letter-spacing:.05em}

/* Age dial */
.ageWrap{width:min(360px,90vw);height:190px;position:relative;
  background:linear-gradient(180deg,var(--panel2),var(--panel));
  border-radius:18px;border:1px solid var(--border);overflow:hidden;touch-action:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 12px 30px -16px #000}
.ageWrap canvas{width:100%;height:100%;display:block;cursor:grab}
.ageWrap.drag canvas{cursor:grabbing}
.ageLabel{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  font-size:10px;color:var(--muted);letter-spacing:.4em}
.ageValue{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  font-size:30px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums;
  text-shadow:0 0 18px rgba(247,147,26,.5)}

.nameWrap{width:min(360px,90vw);display:flex;flex-direction:column;gap:12px}
.nameWrap input{width:100%;padding:15px 16px;border-radius:14px;
  background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--border);color:var(--txt);font-size:16px;outline:none;text-align:center;
  transition:border-color .2s, box-shadow .2s}
.nameWrap input:focus{border-color:var(--gold);box-shadow:0 0 0 4px rgba(247,147,26,.15)}
.startBtn{padding:16px;border-radius:14px;
  background:linear-gradient(135deg,#f7931a 0%,#ffaa3a 40%,#e07a0d 100%);
  color:#fff;font-weight:800;font-size:15px;letter-spacing:.25em;opacity:.35;
  transition:opacity .3s,transform .2s,box-shadow .3s;
  box-shadow:0 8px 24px -12px rgba(247,147,26,.6)}
.startBtn.ready{opacity:1}
.startBtn.ready:hover{transform:translateY(-2px);box-shadow:0 16px 32px -10px rgba(247,147,26,.7)}

/* ========== TABS ========== */
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px;
  background:linear-gradient(180deg,rgba(22,27,37,.78),rgba(22,27,37,.92));
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--border)}
.tab{padding:10px 4px;border-radius:10px;font-weight:700;font-size:11px;color:#fff;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:transform .2s,filter .2s,box-shadow .2s;
  filter:saturate(.55) brightness(.6);position:relative;letter-spacing:.05em}
.tab svg{width:18px;height:18px}
.tab.active{filter:none;transform:translateY(-2px)}
.tab.t-gen{background:linear-gradient(180deg,#ef4444,#b91c1c)}
.tab.t-cry{background:linear-gradient(180deg,#22c55e,#15803d)}
.tab.t-upg{background:linear-gradient(180deg,#3b82f6,#1e40af)}
.tab.t-buy{background:linear-gradient(180deg,#f97316,#c2410c)}
.tab.t-gen.active{box-shadow:0 6px 20px -6px #ef4444}
.tab.t-cry.active{box-shadow:0 6px 20px -6px #22c55e}
.tab.t-upg.active{box-shadow:0 6px 20px -6px #3b82f6}
.tab.t-buy.active{box-shadow:0 6px 20px -6px #f97316}

/* ========== GAME PANELS ========== */
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));
  border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--border);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 8px 24px -16px #000}
.panel h3{margin:0 0 12px;font-size:12px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;
  display:flex;align-items:center;gap:8px}
.panel h3 svg{width:14px;height:14px}

/* Generate Game */
.genWizard .steps{display:flex;gap:5px;margin-bottom:14px}
.genWizard .stepDot{flex:1;height:4px;background:var(--border);border-radius:2px;transition:background .3s}
.genWizard .stepDot.done{background:linear-gradient(90deg,#ef4444,#f7931a)}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.choice{padding:14px;border-radius:12px;background:var(--panel2);border:1px solid var(--border);
  font-weight:600;text-align:left;font-size:13px;transition:all .2s;position:relative;overflow:hidden}
.choice:hover{border-color:var(--gold);transform:translateY(-1px)}
.choice.sel{border-color:var(--gold);background:linear-gradient(135deg,rgba(247,147,26,.18),rgba(247,147,26,.05));
  box-shadow:0 0 0 1px var(--gold), 0 8px 20px -10px rgba(247,147,26,.5)}
.choice small{display:block;color:var(--muted);font-weight:400;font-size:11px;margin-top:4px;letter-spacing:.05em}
.genProgress{margin-top:14px;height:12px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.genProgress div{height:100%;background:linear-gradient(90deg,#ef4444,#f7931a,#ffd27a);width:0;transition:width .2s;
  box-shadow:0 0 12px rgba(247,147,26,.5)}
.genStatus{text-align:center;font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:.1em}

/* Crypto */
.cryTabs{display:flex;gap:6px;margin-bottom:12px;padding:4px;background:var(--panel2);border-radius:10px;border:1px solid var(--border)}
.cryTab{flex:1;padding:9px;border-radius:7px;background:transparent;font-size:12px;font-weight:700;color:var(--muted);
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.cryTab svg{width:14px;height:14px}
.cryTab.active{background:linear-gradient(180deg,#22c55e,#15803d);color:#fff;box-shadow:0 4px 12px -4px #22c55e}
.chartWrap{height:230px;background:#05070d;border-radius:12px;overflow:hidden;position:relative;
  border:1px solid var(--border);box-shadow:inset 0 0 40px rgba(0,0,0,.6)}
.chartWrap canvas{width:100%;height:100%;display:block}
.chartInfo{position:absolute;top:10px;left:12px;font-size:11px;color:#a8b2c8;letter-spacing:.05em}
.chartInfo b{font-size:18px;display:block;color:var(--gold);font-variant-numeric:tabular-nums;
  text-shadow:0 0 12px rgba(247,147,26,.4);margin:2px 0}
.tradeRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px}
.tradeBtn{padding:12px;border-radius:10px;font-weight:800;font-size:12px;color:#fff;letter-spacing:.15em;
  transition:transform .15s,filter .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.tradeBtn svg{width:14px;height:14px}
.tradeBtn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.tradeBtn.buy{background:linear-gradient(180deg,#22c55e,#15803d);box-shadow:0 6px 16px -8px #22c55e}
.tradeBtn.sell{background:linear-gradient(180deg,#ef4444,#b91c1c);box-shadow:0 6px 16px -8px #ef4444}
.tradeBtn.dep{background:linear-gradient(180deg,#64748b,#334155);box-shadow:0 6px 16px -8px #64748b}
.stockList{max-height:320px;overflow-y:auto;margin-top:12px;border-radius:10px;background:var(--panel2);border:1px solid var(--border)}
.stockItem{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;
  border-bottom:1px solid var(--border);font-size:12px;cursor:pointer;transition:background .15s}
.stockItem:last-child{border-bottom:none}
.stockItem:hover{background:rgba(255,255,255,.03)}
.stockItem.active{background:linear-gradient(90deg,rgba(247,147,26,.18),transparent);
  box-shadow:inset 3px 0 0 var(--gold)}
.stockItem .nm{font-weight:600}
.stockItem .pr{font-variant-numeric:tabular-nums;font-weight:700}
.stockItem .up{color:#22c55e} .stockItem .dn{color:#ef4444}
.tierBadge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;margin-right:6px;
  background:linear-gradient(180deg,var(--panel),var(--panel2));color:var(--muted);
  border:1px solid var(--border);font-weight:700;letter-spacing:.05em}

/* Upgrade */
.upgRow{display:flex;justify-content:space-between;align-items:center;padding:14px;
  background:linear-gradient(180deg,var(--panel2),rgba(0,0,0,.1));
  border-radius:12px;margin-bottom:8px;border:1px solid var(--border);gap:10px}
.upgRow .nmWrap{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.upgRow .iconBox{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#3b82f6,#1e40af);box-shadow:0 4px 12px -4px #3b82f6;flex-shrink:0}
.upgRow .iconBox svg{width:22px;height:22px;color:#fff}
.upgRow .lvl{font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}
.upgRow .nm{font-weight:800;font-size:14px;margin:1px 0}
.upgRow .desc{font-size:11px;color:var(--muted)}
.upgBtn{padding:11px 14px;border-radius:10px;background:linear-gradient(180deg,#3b82f6,#1e40af);
  color:#fff;font-weight:800;font-size:12px;letter-spacing:.05em;
  box-shadow:0 4px 12px -4px #3b82f6;transition:transform .15s,filter .2s;white-space:nowrap}
.upgBtn:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.1)}
.upgBtn:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.5)}

/* Buy */
.buySection{margin-bottom:14px}
.buyList{display:grid;gap:6px;max-height:340px;overflow-y:auto;padding-right:4px}
.buyItem{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
  padding:11px;background:linear-gradient(180deg,var(--panel2),rgba(0,0,0,.08));
  border-radius:10px;font-size:12px;border:1px solid var(--border);transition:border-color .2s}
.buyItem:hover{border-color:rgba(247,147,26,.4)}
.buyItem .tier{width:34px;height:34px;border-radius:8px;
  background:linear-gradient(180deg,#f97316,#c2410c);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;letter-spacing:.02em;
  box-shadow:0 4px 10px -4px #f97316}
.buyItem .tier.pc{background:linear-gradient(180deg,#3b82f6,#1e40af);box-shadow:0 4px 10px -4px #3b82f6}
.buyItem .nm{font-weight:700;font-size:13px}
.buyItem .desc{color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums}
.buyItem .own{display:inline-block;background:linear-gradient(180deg,#ffd27a,#f7931a);color:#000;border-radius:10px;padding:1px 7px;
  font-size:10px;font-weight:800;margin-left:6px}
.buyItem button{padding:9px 11px;border-radius:8px;
  background:linear-gradient(180deg,#f97316,#c2410c);color:#fff;font-weight:800;font-size:11px;
  box-shadow:0 3px 10px -3px #f97316;white-space:nowrap;transition:transform .15s,filter .2s}
.buyItem button:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.1)}
.buyItem button:disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.5)}
.buyItem button.pc{background:linear-gradient(180deg,#3b82f6,#1e40af);box-shadow:0 3px 10px -3px #3b82f6}

/* PC slots */
.pcSlots{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.pcCard{padding:12px;background:linear-gradient(180deg,var(--panel2),rgba(0,0,0,.1));
  border-radius:10px;font-size:11px;position:relative;border:1px solid var(--border)}
.pcCard.empty{opacity:.5;border:1px dashed var(--border)}
.pcCard b{font-size:13px;display:block;margin-bottom:4px;color:var(--gold)}
.pcCard .mult{color:var(--muted);font-size:10px}
.pcCard .worker{color:#fff;font-weight:700;margin-top:6px;font-size:11px;
  padding:4px 8px;background:linear-gradient(180deg,rgba(247,147,26,.2),rgba(247,147,26,.05));
  border-radius:6px;border:1px solid rgba(247,147,26,.3)}
.pcCard.empty .worker{background:transparent;border:none;color:var(--muted);padding:4px 0}

/* ========== MODAL ========== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;
  justify-content:center;z-index:50;padding:20px;animation:fadeIn .25s;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.modal.show{display:flex}
.modalBox{background:linear-gradient(180deg,var(--panel),var(--panel2));
  border-radius:20px;padding:22px;width:100%;max-width:420px;
  max-height:85vh;overflow-y:auto;border:1px solid var(--border);
  box-shadow:0 30px 60px -20px #000, inset 0 1px 0 rgba(255,255,255,.05)}
.modalBox h2{margin:0 0 18px;font-size:18px;display:flex;align-items:center;gap:10px;letter-spacing:.04em}
.modalBox h2 svg{width:20px;height:20px;color:var(--gold)}
.modalRow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;
  border-bottom:1px solid var(--border);gap:14px}
.modalRow:last-child{border-bottom:none}
.toggle{width:46px;height:26px;background:var(--border);border-radius:13px;position:relative;cursor:pointer;
  transition:background .2s;flex-shrink:0}
.toggle.on{background:linear-gradient(180deg,#22c55e,#15803d)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;
  background:#fff;transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 6px rgba(0,0,0,.3)}
.toggle.on::after{transform:translateX(20px)}
.redeem{display:flex;gap:6px;margin-top:8px}
.redeem input{flex:1;padding:11px;border-radius:9px;background:var(--panel2);border:1px solid var(--border);
  color:var(--txt);outline:none;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.redeem input:focus{border-color:var(--gold)}
.redeem button{padding:11px 16px;border-radius:9px;
  background:linear-gradient(180deg,#ffd27a,#f7931a);color:#000;font-weight:800;letter-spacing:.05em;
  box-shadow:0 4px 12px -4px rgba(247,147,26,.6)}
.closeBtn{margin-top:14px;width:100%;padding:13px;border-radius:11px;background:var(--panel2);font-weight:700;
  border:1px solid var(--border);letter-spacing:.1em;transition:background .2s}
.closeBtn:hover{background:var(--panel)}
.toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);
  background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--gold);padding:11px 20px;border-radius:11px;z-index:200;font-size:13px;font-weight:700;
  opacity:0;transition:opacity .3s,bottom .3s;pointer-events:none;
  box-shadow:0 12px 32px -10px rgba(0,0,0,.6), 0 0 24px -8px rgba(247,147,26,.5)}
.toast.show{opacity:1;bottom:100px}

.buffTag{background:linear-gradient(180deg,#22c55e,#15803d);color:#fff;padding:4px 9px;border-radius:7px;
  font-size:10px;font-weight:800;margin-left:6px;letter-spacing:.05em;
  box-shadow:0 0 12px -2px #22c55e}


@media(max-width:480px){

function ic(name, cls=''){ return `<span class="ic ${cls}" style="display:inline-flex;align-items:center;line-height:0">${IC[name]||''}</span>`; }
/* ===== CHILL AMBIENT MUSIC =====
   Chord pad progression: Am - F - C - G (lofi-ish), slow attack, gentle release.
   Plus a soft sine "bell" arpeggio on top, and a low sub drone.
*/
let musicTimers=[], musicNodes=[];
function musicStart(){
  if(!S.mus||musicTimers.length) return;
  try{
    const a=audio();
    musicGain=a.createGain(); musicGain.gain.value=.0; musicGain.connect(a.destination);
    musicGain.gain.linearRampToValueAtTime(.18, a.currentTime+2.5);
    musicNodes.push(musicGain);

    // Low sub drone
    const drone=a.createOscillator(), dg=a.createGain();
    drone.type='sine'; drone.frequency.value=55;
    dg.gain.value=.08; drone.connect(dg); dg.connect(musicGain); drone.start();
    musicNodes.push(drone,dg);

    // Chord progression (Am7, Fmaj7, Cmaj7, G) — root, 3rd, 5th, 7th
    const chords=[
      [220.00, 261.63, 329.63, 392.00], // Am7
      [174.61, 220.00, 261.63, 329.63], // Fmaj7
      [130.81, 164.81, 196.00, 246.94], // Cmaj7
      [196.00, 246.94, 293.66, 369.99], // G
    ];
    let ci=0;
    function playChord(){
      if(!musicGain) return;
      const now=a.currentTime, ch=chords[ci%chords.length];
      ch.forEach(f=>{
        const o=a.createOscillator(), g=a.createGain();
        o.type='sine'; o.frequency.value=f;
        // soft detune for warmth
        const o2=a.createOscillator(), g2=a.createGain();
        o2.type='triangle'; o2.frequency.value=f*1.005; g2.gain.value=.04;
        g.gain.setValueAtTime(0,now);
        g.gain.linearRampToValueAtTime(.06, now+1.2);
        g.gain.linearRampToValueAtTime(.04, now+3);
        g.gain.linearRampToValueAtTime(0, now+4);
        o.connect(g); g.connect(musicGain);
        o2.connect(g2); g2.connect(musicGain);
        o.start(now); o.stop(now+4.1);
        o2.start(now); o2.stop(now+4.1);
      });
      ci++;
    }
    playChord();
    musicTimers.push(setInterval(playChord, 4000));

    // Gentle bell arpeggio (random notes from C major pentatonic, sparse)
    const pent=[523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
    musicTimers.push(setInterval(()=>{
      if(!musicGain || Math.random()<.45) return;
      const now=a.currentTime, f=pent[Math.floor(Math.random()*pent.length)];
      const o=a.createOscillator(), g=a.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(.035, now+.02);
      g.gain.exponentialRampToValueAtTime(.001, now+1.5);
      o.connect(g); g.connect(musicGain);
      o.start(now); o.stop(now+1.6);
    }, 1000));
  }catch(e){}
}
function musicStop(){
  musicTimers.forEach(t=>clearInterval(t)); musicTimers=[];
  musicNodes.forEach(n=>{ try{ n.stop&&n.stop(); n.disconnect&&n.disconnect(); }catch{} });
  musicNodes=[]; musicGain=null;
}

/* ============ AGE DIAL ============ */
function initAgeDial(){
  const wrap=document.getElementById('ageWrap');
  const cv=document.getElementById('ageCv'), ctx=cv.getContext('2d');
  const val=document.getElementById('ageVal');
  let dragging=false, lastX=0;
  function draw(){
    const W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
    // semicircle range 1..100, dial offset = age
    const cx=W/2, cy=H+40, R=H*1.1;
    // ticks
    for(let i=1;i<=100;i++){
      const a = (i - S.age)/100 * Math.PI * 2.2 - Math.PI/2;
      if(a<-Math.PI||a>0) continue;
      const x1=cx+Math.cos(a)*(R-30), y1=cy+Math.sin(a)*(R-30);
      const x2=cx+Math.cos(a)*(R-(i%10===0?60:45)), y2=cy+Math.sin(a)*(R-(i%10===0?60:45));
      const dist = Math.abs(i - S.age);
      const alpha = Math.max(0, 1 - dist/30);
      // fade left side
      const leftFade = a < -Math.PI/2 ? (a+Math.PI)/(Math.PI/2) : 1;
      ctx.strokeStyle = `rgba(247,147,26,${alpha*leftFade*0.9})`;
      ctx.lineWidth = i%10===0?2.5:1.2;
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
      if(i%10===0 && alpha>.2){
        ctx.fillStyle=`rgba(232,236,243,${alpha*leftFade})`; ctx.font='14px sans-serif';
        ctx.textAlign='center';
        const tx=cx+Math.cos(a)*(R-80), ty=cy+Math.sin(a)*(R-80);
        ctx.fillText(i,tx,ty);
      }
    }
    // needle (center, pointing up)
    ctx.strokeStyle='#f7931a'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx,cy-R+20); ctx.stroke();
    ctx.fillStyle='#f7931a'; ctx.beginPath(); ctx.arc(cx,cy-R+20,5,0,Math.PI*2); ctx.fill();
    val.textContent = S.age + ' th';
  }
  draw();
  function onDown(e){ dragging=true; wrap.classList.add('drag'); lastX = e.touches?e.touches[0].clientX:e.clientX; }
  function onMove(e){
    if(!dragging) return; e.preventDefault();
    const x = e.touches?e.touches[0].clientX:e.clientX;
    const dx = x - lastX; lastX = x;
    S.age = Math.max(1, Math.min(100, S.age - dx*0.3));
    S.age = Math.round(S.age);
    draw();
  }
  function onUp(){ if(dragging) sfxClick(); dragging=false; wrap.classList.remove('drag'); }
  cv.addEventListener('mousedown',onDown); window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',onUp);
  cv.addEventListener('touchstart',onDown,{passive:false}); window.addEventListener('touchmove',onMove,{passive:false}); window.addEventListener('touchend',onUp);
}

// Seed candles so chart isn't empty
function seedHistory(arr, vol){
  for(const a of arr){
    let p = a.price;
    a.history = [];
    for(let i=0;i<35;i++){
      const o=p;
      p = Math.max(a.min*0.6, Math.min(a.max*1.3, p*(1+(Math.random()-0.5)*(vol||0.04))));
      const c=p;
      const h=Math.max(o,c)*(1+Math.random()*0.015);
      const l=Math.min(o,c)*(1-Math.random()*0.015);
      a.history.push({o,h,l,c});
    }
    a.price = p;
  }
}

function fmt(n){
  if(n<0) return '-'+fmt(-n);
  if(n>=1e15)return (n/1e15).toFixed(2)+'Q';
  if(n>=1e12)return (n/1e12).toFixed(2)+'T';
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}

function workerRate(){ // /s from workers placed in pcs
  let total=0;
  for(const slot of S.pcs){
    if(!slot.worker) continue;
    const pc = PCS[slot.tier-1];
    if(slot.worker==='user'){ total += 1000 * pc.mult; }
    else { const w=WORKERS[slot.worker-1]; total += w.rate * pc.mult; }
  }
  if(S.buffUntil>Date.now()) total*=2;
  return total;
}

/* ===== DETERMINISTIC PRICE ENGINE =====
   Semua pemain melihat candle yang SAMA berdasarkan jam UNIX.
   Setiap detik = 1 tick. Setiap 5 detik = 1 candle.
   Drift di-generate dari seeded RNG: hash(symbol) XOR tickIndex.
*/
function hashStr(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }
function seedRand(sym,tick){ return mulberry32(hashStr(sym) ^ (tick|0))(); }

const CANDLE_SEC = 5;          // 1 candle = 5 detik
const CANDLE_COUNT = 35;       // tampil 35 candle
const LOOKBACK_SEC = CANDLE_SEC * CANDLE_COUNT;

function nowSec(){ return Math.floor(Date.now()/1000); }

// Walk price from `LOOKBACK_SEC` detik lalu sampai sekarang (deterministic).
function computeAllAssets(){
  const sec = nowSec();
  const startSec = sec - LOOKBACK_SEC;
  const assets = STOCK_LIST.concat(COINS);
  for(const a of assets){
    const vol = a.vol || 0.025;
    let p = (a.min + a.max)/2;
    const ticks = [];
    for(let s = startSec; s <= sec; s++){
      const r = seedRand(a.sym, s);
      p = p * (1 + (r - 0.5) * vol);
      p = Math.max(a.min*0.4, Math.min(a.max*1.6, p));
      ticks.push({s, p});
    }
    a.price = p;
    // group jadi candle per CANDLE_SEC detik
    const candles=[];
    for(let i=0;i<ticks.length;i+=CANDLE_SEC){
      const slice = ticks.slice(i, i+CANDLE_SEC);
      if(!slice.length) continue;
      const o=slice[0].p, c=slice[slice.length-1].p;
      let h=o, l=o; for(const t of slice){ if(t.p>h)h=t.p; if(t.p<l)l=t.p; }
      candles.push({o,h,l,c});
    }
    a.history = candles.slice(-CANDLE_COUNT);
  }
}

    else { startGen(); }
  };
  const pp=document.getElementById('genPrev'); if(pp) pp.onclick=()=>{ S.genStep--; renderGen(); };
}
function startGen(){
  S.genActive=true; S.genProgress=0; renderGen();
  const speed = 1 + S.wifi*0.5;
  const iv=setInterval(()=>{
    S.genProgress += speed;
    if(S.genProgress>=100){
      clearInterval(iv);
      // reward
      const basePc = PCS[S.pc-1].mult;
      const reward = Math.floor(50000 * basePc * (1 + S.pc*0.5) * (S.buffUntil>Date.now()?2:1));
      S.money += reward;
      sfxCash();
      toast('Game terjual! +'+rp(reward));
      S.genActive=false; S.genStep=0; S.genChoices=[null,null,null,null];
      renderGen(); renderHeader();
    } else {
      const bar=document.getElementById('genBar');
      if(bar) bar.style.width=S.genProgress+'%';
    }
  }, 200);
}

/* ================ UPGRADE ================ */
function upgCost(base,lvl){ return Math.floor(base * Math.pow(1.5, lvl-1)); }
function renderUpg(){
  const wifiCost=upgCost(20000,S.wifi);
  const pcCost=upgCost(50000,S.pc);
  document.getElementById('panelUpg').innerHTML = `
    <div class="panel">
      <h3>${IC.upgrade}Upgrade</h3>
      <div class="upgRow">
        <div class="nmWrap"><div class="iconBox">${IC.wifi}</div>
          <div><div class="lvl">Level ${S.wifi}</div><div class="nm">WiFi</div><div class="desc">Mempercepat upload game</div></div></div>
        <button class="upgBtn" id="upWifi" ${S.money<wifiCost?'disabled':''}>${rp(wifiCost)}</button>
      </div>
      <div class="upgRow">
        <div class="nmWrap"><div class="iconBox">${IC.pc}</div>
          <div><div class="lvl">Level ${S.pc}</div><div class="nm">PC Power</div><div class="desc">+harga jual game/detik</div></div></div>
        <button class="upgBtn" id="upPc" ${S.money<pcCost?'disabled':''}>${rp(pcCost)}</button>
      </div>
    </div>`;
  document.getElementById('upWifi').onclick=()=>{ if(S.money>=wifiCost){ S.money-=wifiCost; S.wifi++; sfxCash(); renderUpg(); renderHeader(); } };
  document.getElementById('upPc').onclick=()=>{ if(S.money>=pcCost){ S.money-=pcCost; S.pc++; sfxCash(); renderUpg(); renderHeader(); } };
}

/* ================ BUY ================ */
function renderBuy(){
  const own = S.workers;
  const html = `
    <div class="panel buySection">
      <h3>${IC.pc}PC Slots (${S.pcs.length})</h3>
      <div class="pcSlots">
        ${S.pcs.map((slot,i)=>`<div class="pcCard ${slot.worker?'':'empty'}">
          <b>PC #${i+1}</b>
          ${PCS[slot.tier-1].name}<br>×${PCS[slot.tier-1].mult}
          <div class="worker">${slot.worker===`user`?IC.user+`You`:slot.worker?IC.worker+WORKERS[slot.worker-1].name:`(kosong)`}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="panel buySection">
      <h3>${IC.pc}Beli PC Baru</h3>
      <div class="buyList">
        ${PCS.map(p=>`<div class="buyItem">
          <div class="tier" style="background:#2563eb">P${p.tier}</div>
          <div><div class="nm">${p.name}</div><div class="desc">Multiplier ×${p.mult}</div></div>
          <button data-pc="${p.tier}" ${S.money<p.price?'disabled':''}>${rp(p.price)}</button>
        </div>`).join('')}
      </div>
    </div>
    <div class="panel buySection">
      <h3>${IC.worker}Beli Karyawan</h3>
      <div class="buyList">
        ${WORKERS.map(w=>`<div class="buyItem">
          <div class="tier">L${w.tier}</div>
          <div><div class="nm">${w.name}${own[w.tier]?`<span class="own">×${own[w.tier]}</span>`:''}</div><div class="desc">${fmt(w.rate)}/s</div></div>
          <button data-wk="${w.tier}" ${S.money<w.price?'disabled':''}>${rp(w.price)}</button>
        </div>`).join('')}
      </div>
    </div>`;
  document.getElementById('panelBuy').innerHTML = html;
  document.querySelectorAll('[data-pc]').forEach(b=>b.onclick=()=>{
    const t=+b.dataset.pc, p=PCS[t-1];
    if(S.money<p.price) return;
    S.money-=p.price; S.pcs.push({tier:t,worker:null}); sfxCash(); renderBuy(); renderHeader();
  });
  document.querySelectorAll('[data-wk]').forEach(b=>b.onclick=()=>{
    const t=+b.dataset.wk, w=WORKERS[t-1];
    if(S.money<w.price) return;
    S.money-=w.price; S.workers[t]=(S.workers[t]||0)+1;
    // auto-assign to first empty pc
    const slot=S.pcs.find(s=>!s.worker);
    if(slot) slot.worker=t;
    sfxCash(); renderBuy(); renderHeader();
  });
}

/* ================ CRYPTO ================ */
let cryMode='stocks'; // stocks | coins
function renderCrypto(rebuild){
  const el=document.getElementById('panelCry');
  if(rebuild || !el.innerHTML){
    el.innerHTML = `
      <div class="panel">
        <div class="cryTabs">
          <button class="cryTab ${cryMode==='stocks'?'active':''}" data-m="stocks">${IC.chart}Saham (${STOCK_LIST.length})</button>
          <button class="cryTab ${cryMode==='coins'?'active':''}" data-m="coins">${IC.coin}Crypto</button>
        </div>
        <div class="chartWrap"><canvas id="chartCv"></canvas>
          <div class="chartInfo" id="chartInfo"></div>
        </div>
        <div class="tradeRow">
          <button class="tradeBtn buy" id="btnBuy">BUY 1</button>
          <button class="tradeBtn sell" id="btnSell">SELL 1</button>
          <button class="tradeBtn dep" id="btnDep">DEPOSIT</button>
        </div>
        <div class="stockList" id="stockList"></div>
      </div>`;
    el.querySelectorAll('.cryTab').forEach(b=>b.onclick=()=>{ cryMode=b.dataset.m; renderCrypto(true); });
    document.getElementById('btnBuy').onclick=()=>trade('buy');
    document.getElementById('btnSell').onclick=()=>trade('sell');
    document.getElementById('btnDep').onclick=openDeposit;

  }
  // list
  const list=document.getElementById('stockList');
  if(cryMode==='stocks'){
    const sel = S.selectedStock || STOCK_LIST[0].sym;
    S.selectedStock = sel;
    list.innerHTML = STOCK_LIST.map(s=>{
      const own=(S.stocks[s.sym]||{}).owned||0;
      const last=s.history[s.history.length-2], cur=s.history[s.history.length-1];
      const up = !last || cur.c>=last.c;
      return `<div class="stockItem ${s.sym===sel?'active':''}" data-s="${s.sym}">
        <div><span class="tierBadge">T${s.tier}</span><span class="nm">${s.name}</span>
          ${own?`<span class="own">×${own}</span>`:''}</div>
        <div class="pr ${up?'up':'dn'}">${rp(s.price)}</div>
      </div>`;
    }).join('');
    list.querySelectorAll('.stockItem').forEach(it=>it.onclick=()=>{ S.selectedStock=it.dataset.s; renderCrypto(true); });
  } else {
    const sel = S.selectedCoin || COINS[0].sym;
    S.selectedCoin = sel;
    list.innerHTML = COINS.map(c=>{
      const own=(S.coins[c.sym]||{}).owned||0;
      const last=c.history[c.history.length-2], cur=c.history[c.history.length-1];
      const up = !last || (cur&&cur.c>=last.c);
      return `<div class="stockItem ${c.sym===sel?'active':''}" data-s="${c.sym}">
        <div><span class="tierBadge">${c.sym}</span><span class="nm">${c.name}</span>
          ${own?`<span class="own">×${own.toFixed(4)}</span>`:''}</div>
        <div class="pr ${up?'up':'dn'}">${rp(c.price)}</div>
      </div>`;
    }).join('');
    list.querySelectorAll('.stockItem').forEach(it=>it.onclick=()=>{ S.selectedCoin=it.dataset.s; renderCrypto(true); });
  }
  drawChart();
}

function curAsset(){
  if(cryMode==='stocks') return STOCK_LIST.find(s=>s.sym===S.selectedStock) || STOCK_LIST[0];
  return COINS.find(c=>c.sym===S.selectedCoin) || COINS[0];
}

/* ===== DEPOSIT MODAL ===== */
function openDeposit(){
  const a=curAsset();
  document.getElementById('depInfo').innerHTML =
    `Aset: <b>${a.name}</b> @ ${rp(a.price)}<br>Saldo Anda: <b>${rp(S.money)}</b>`;
  document.getElementById('depAmt').value='';
  updateDepPreview();
  document.getElementById('depModal').classList.add('show');
}
function updateDepPreview(){
  const a=curAsset();
  const amt = parseFloat(document.getElementById('depAmt').value)||0;
  const units = amt / a.price;
  document.getElementById('depPreview').textContent =
    `Anda akan dapat: ${units.toFixed(units<1?6:4)} ${a.sym}`;
}
document.getElementById('depAmt').addEventListener('input',updateDepPreview);
document.querySelectorAll('#depModal [data-pct]').forEach(b=>b.onclick=()=>{
  const pct=parseFloat(b.dataset.pct);
  document.getElementById('depAmt').value=Math.floor(S.money*pct);
  updateDepPreview();
});
document.getElementById('depCancel').onclick=()=>document.getElementById('depModal').classList.remove('show');
document.getElementById('depConfirm').onclick=()=>{
  const a=curAsset();
  const amt=parseFloat(document.getElementById('depAmt').value)||0;
  if(amt<=0){ toast('Masukkan jumlah'); return; }
  if(amt>S.money){ toast('Saldo tidak cukup'); return; }
  const units = amt/a.price;
  const isStock = cryMode==='stocks';
  const bag = isStock?S.stocks:S.coins;
  bag[a.sym]=bag[a.sym]||{owned:0,avg:0};
  const b=bag[a.sym];
  b.avg=(b.avg*b.owned + amt)/(b.owned+units);
  b.owned += units;
  S.money -= amt;
  sfxCash();
  toast(`+${units.toFixed(4)} ${a.sym}`);
  document.getElementById('depModal').classList.remove('show');
  renderCrypto(true); renderHeader();
};



function trade(act){
  const a=curAsset();
  const isStock = cryMode==='stocks';
  const bag = isStock?S.stocks:S.coins;
  if(act==='buy'){
    if(S.money<a.price){ toast('Uang kurang'); return; }
    S.money-=a.price;
    bag[a.sym]=bag[a.sym]||{owned:0,avg:0};
    const b=bag[a.sym]; b.avg=(b.avg*b.owned+a.price)/(b.owned+1); b.owned+=1;
    sfxCash();
  } else {
    if(!bag[a.sym] || bag[a.sym].owned<1){ toast('Tidak ada untuk dijual'); return; }
    bag[a.sym].owned-=1; S.money+=a.price; sfxCash();
  }
  renderCrypto(true); renderHeader();
}

function drawChart(){
  const cv=document.getElementById('chartCv'); if(!cv) return;
  const ctx=cv.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const rect=cv.getBoundingClientRect();
  if(cv.width !== rect.width*dpr || cv.height !== rect.height*dpr){
    cv.width=rect.width*dpr; cv.height=rect.height*dpr;
  }
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=rect.width, H=rect.height;
  // bg gradient
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0e1a'); bg.addColorStop(1,'#05070d');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const a=curAsset();
  const hist=a.history;
  if(!hist.length) return;
  const padT=20, padB=20, padR=70, padL=10;
  const chartH=H-padT-padB, chartW=W-padL-padR;
  const min=Math.min(...hist.map(c=>c.l)), max=Math.max(...hist.map(c=>c.h));
  const range=(max-min)||1;
  const yOf=v=>padT+chartH-((v-min)/range)*chartH;

  // grid + price labels
  ctx.strokeStyle='rgba(255,255,255,.05)'; ctx.lineWidth=1;
  ctx.fillStyle='rgba(160,170,190,.6)'; ctx.font='10px ui-monospace,monospace';
  ctx.textAlign='left'; ctx.textBaseline='middle';
  for(let i=0;i<=4;i++){
    const y=padT+chartH*i/4;
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(W-padR,y); ctx.stroke();
    const v=max-(range*i/4);
    ctx.fillText(fmt(v), W-padR+6, y);
  }

  const n=hist.length;
  const cw=chartW/n;
  const bodyW=Math.max(2,cw*0.7);

  hist.forEach((c,i)=>{
    const cx=padL+i*cw+cw/2;
    const yH=yOf(c.h), yL=yOf(c.l), yO=yOf(c.o), yC=yOf(c.c);
    const up=c.c>=c.o;
    const col=up?'#22c55e':'#ef4444';
    // wick
    ctx.strokeStyle=col; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(cx,yH); ctx.lineTo(cx,yL); ctx.stroke();
    // body
    ctx.fillStyle=col;
    const top=Math.min(yO,yC), h=Math.max(1.5,Math.abs(yC-yO));
    ctx.fillRect(cx-bodyW/2, top, bodyW, h);
  });

  // current price line
  const yCur=yOf(a.price);
  ctx.strokeStyle='rgba(247,147,26,.7)'; ctx.setLineDash([3,3]); ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(padL,yCur); ctx.lineTo(W-padR,yCur); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#f7931a'; ctx.fillRect(W-padR,yCur-9,padR-4,18);
  ctx.fillStyle='#000'; ctx.font='bold 10px ui-monospace,monospace';
  ctx.textAlign='center'; ctx.fillText(fmt(a.price), W-padR/2-2, yCur);

  const last=hist[hist.length-2], cur=hist[hist.length-1];
  const chg = last? ((cur.c-last.c)/last.c*100):0;
  document.getElementById('chartInfo').innerHTML =
    `${a.name}<b>${rp(a.price)}</b><span style="color:${chg>=0?'#22c55e':'#ef4444'}">${chg>=0?`<span style="color:#22c55e">+</span>`:`<span style="color:#ef4444">-</span>`} ${chg.toFixed(2)}%</span>`;
}
